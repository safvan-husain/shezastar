services:
  seed:
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}

  migration:
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}

  app:
    build:
      target: deps
    image: shezastar-dev
    volumes:
      - .:/app
      - /app/node_modules
      - shezastar-uploads:/app/public/uploads
    environment:
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: npm run dev
