services:
  # MongoDB service (Kept for now, but application uses Atlas)
  mongodb:
    image: mongo:7.0
    container_name: shezastar-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-shezastar}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shezastar-network

  # Seeding service
  seed:
    build:
      context: .
      target: seeder
    container_name: shezastar-seed
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}
    networks:
      - shezastar-network

  # Migration service
  migration:
    build:
      context: .
      target: seeder
    container_name: shezastar-migration
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}
    entrypoint: npx tsx scripts/run-migrations.ts
    depends_on:
      seed:
        condition: service_completed_successfully
    networks:
      - shezastar-network

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shezastar-app
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}
    depends_on:
      seed:
        condition: service_completed_successfully
      migration:
        condition: service_completed_successfully
    networks:
      - shezastar-network

volumes:
  mongodb_data:
  shezastar-uploads:

networks:
  shezastar-network:
    driver: bridge