services:
  seed:
    env_file:
      - .env.production
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}

  migration:
    env_file:
      - .env.production
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}

  app:
    build:
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME:-shezastar}
      # Production optimizations
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - shezastar-uploads:/app/public/uploads
